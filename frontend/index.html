<!DOCTYPE html>
<html lang="fi">

<head>
  <meta charset="UTF-8">
  <title>Sääsovellus</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  
<div class="app">
  <div class="search">
    <input type="text" id="cityInput" placeholder="Syötä kaupunki">
    <button id="searchBtn">Hae</button>

  <div class="weather">
    <h1 id="city">--</h1>
    <h2 id="temp">--°C</h2>

  </div>

  <div class="details">
    <p id="wind">--</p>
    <p id="humidity">--</p>
  </div>
</div>

<!-- JS -->
<script src="js/script.js"></script>

</body>
</html>
